<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>20260708 小樽相簿</title>

  <script src="https://cdn.jsdelivr.net/npm/heic2any/dist/heic2any.min.js"></script>

  <style>
    :root {
      --bg: #050507;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --line: rgba(255,255,255,.1);
      --accent: #7dd3fc;
      --radius: 22px;
      --shadow: 0 24px 80px rgba(0,0,0,.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(125,211,252,.18), transparent 34%),
        radial-gradient(circle at 80% 20%, rgba(168,85,247,.12), transparent 30%),
        var(--bg);
    }

    body.viewer-open {
      overflow: hidden;
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      margin-bottom: 28px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 13px;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 6vw, 72px);
      letter-spacing: -0.06em;
      line-height: .92;
    }

    .desc {
      margin: 16px 0 0;
      max-width: 680px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(16px);
      color: var(--text);
      font-size: 14px;
      font-weight: 650;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.11);
      border-color: rgba(255,255,255,.22);
    }

    .btn.primary {
      color: #061016;
      background: linear-gradient(135deg, #bae6fd, #7dd3fc);
      border-color: transparent;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .card {
      grid-column: span 4;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.035));
      box-shadow: var(--shadow);
    }

    .thumb {
      position: relative;
      aspect-ratio: 4 / 3;
      background: #0b0c10;
      overflow: hidden;
      cursor: zoom-in;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .35s ease, opacity .25s ease;
    }

    .card:hover .thumb img { transform: scale(1.035); }

    .status {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      background:
        linear-gradient(135deg, rgba(255,255,255,.08), rgba(255,255,255,.02)),
        #0b0c10;
      z-index: 1;
    }

    .status strong {
      display: block;
      color: var(--text);
      margin-bottom: 8px;
      font-size: 16px;
    }

    .status.hide { display: none; }

    .spinner {
      width: 26px;
      height: 26px;
      margin: 0 auto 14px;
      border-radius: 999px;
      border: 3px solid rgba(255,255,255,.16);
      border-top-color: var(--accent);
      animation: spin .9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .meta {
      padding: 14px 14px 16px;
      display: grid;
      gap: 12px;
    }

    .name {
      color: #e5e7eb;
      font-size: 13px;
      line-height: 1.35;
      word-break: break-all;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .actions .btn {
      flex: 1;
      min-height: 38px;
      font-size: 13px;
      padding: 0 12px;
    }

    .notice {
      margin-top: 18px;
      padding: 14px 16px;
      border: 1px solid rgba(125,211,252,.25);
      border-radius: 18px;
      background: rgba(125,211,252,.08);
      color: #dbeafe;
      font-size: 13px;
      line-height: 1.65;
    }

    .viewer {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      background: rgba(0,0,0,.92);
      backdrop-filter: blur(10px);
    }

    .viewer.show {
      display: block;
    }

    .viewer-topbar {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 1003;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      pointer-events: none;
    }

    .viewer-actions {
      display: grid;
      gap: 10px;
      pointer-events: auto;
    }

    .viewer-title {
      max-width: calc(100vw - 96px);
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      background: rgba(10,10,12,.72);
      backdrop-filter: blur(14px);
      color: var(--muted);
      font-size: 13px;
      word-break: break-all;
      pointer-events: auto;
    }

    .viewer-icon-btn {
      width: 46px;
      height: 46px;
      padding: 0;
      border-radius: 999px;
      font-size: 28px;
      line-height: 1;
      pointer-events: auto;
    }

    .viewer-download {
      font-size: 22px;
    }

    .viewer-download svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .viewer-stage {
      position: absolute;
      inset: 0;
      overflow: auto;
      cursor: grab;
      overscroll-behavior: contain;
      padding: 88px 48px 48px;
    }

    .viewer-stage.dragging {
      cursor: grabbing;
      user-select: none;
    }

    .viewer-canvas {
      min-width: 100%;
      min-height: 100%;
      display: grid;
      place-items: center;
    }

    .viewer-canvas img {
      display: block;
      width: auto;
      height: auto;
      max-width: none;
      max-height: none;
      border-radius: 12px;
      box-shadow: 0 24px 90px rgba(0,0,0,.7);
      background: #111;
      transform-origin: center center;
    }

    .viewer-hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 1003;
      transform: translateX(-50%);
      padding: 9px 13px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      background: rgba(10,10,12,.72);
      backdrop-filter: blur(14px);
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      .hero { align-items: flex-start; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
      .card { grid-column: span 6; }
    }

    @media (max-width: 600px) {
      .shell { width: min(100% - 22px, 1180px); padding-top: 26px; }
      .card { grid-column: span 12; }
      .actions { flex-direction: column; }
      .viewer-stage { padding: 78px 22px 34px; }
      .viewer-title { font-size: 12px; max-width: calc(100vw - 82px); }
      .viewer-icon-btn { width: 42px; height: 42px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <div class="eyebrow">Photo Gallery</div>
        <h1>20260708<br>小樽相簿</h1>
        <p class="desc">
          v1.2
        </p>
      </div>

      <div class="toolbar">
        <a class="btn primary" href="https://raw.githubusercontent.com/kevin3291682003/sinomosSharing/main/20260708%E5%B0%8F%E6%A8%BD/20260708%E5%B0%8F%E6%A8%BDall.zip" download>
          下載全部 ZIP
        </a>
        <a class="btn" href="https://github.com/kevin3291682003/sinomosSharing/tree/main/20260708%E5%B0%8F%E6%A8%BD" target="_blank" rel="noreferrer">
          開啟 GitHub
        </a>
      </div>
    </section>

    <section id="gallery" class="grid" aria-label="小樽相簿"></section>

    <div class="notice">
      放大模式：圖片會以原圖 50% 尺寸開啟，可用滑鼠拖曳或滾動查看上下左右；右上角 × 固定可點，關閉後回到正常網頁。
    </div>
  </main>

  <section id="viewer" class="viewer" aria-hidden="true">
    <div class="viewer-topbar">
      <div id="viewerTitle" class="viewer-title"></div>
      <div class="viewer-actions">
        <button class="btn viewer-icon-btn" id="closeViewer" type="button" aria-label="關閉">×</button>
        <a class="btn viewer-icon-btn viewer-download" id="viewerDownload" href="#" download aria-label="下載此照片" title="下載此照片">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M11 4a1 1 0 0 1 2 0v8.59l2.3-2.3a1 1 0 1 1 1.4 1.42l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 1 1 1.4-1.42l2.3 2.3V4Zm-5 14a1 1 0 0 1 1-1h10a1 1 0 1 1 0 2H7a1 1 0 0 1-1-1Z"/>
          </svg>
        </a>
      </div>
    </div>

    <div id="viewerStage" class="viewer-stage">
      <div class="viewer-canvas">
        <div id="viewerStatus" class="status hide">
          <div>
            <div class="spinner"></div>
            <strong>正在準備預覽</strong>
            <span>請稍候</span>
          </div>
        </div>
        <img id="viewerImg" alt="">
      </div>
    </div>

    <div class="viewer-hint">拖曳或滾動查看圖片，按 × 關閉</div>
  </section>

  <script>
    const baseUrl = "https://raw.githubusercontent.com/kevin3291682003/sinomosSharing/main/20260708%E5%B0%8F%E6%A8%BD/";

    const photos = [
      "IMG_20260708_145330.HEIC",
      "IMG_20260708_145330_1.HEIC",
      "IMG_20260708_145330_2.HEIC",
      "IMG_20260708_145330_3.HEIC",
      "IMG_20260708_145329.HEIC",
      "IMG_20260708_145329_1.HEIC"
    ];

    const gallery = document.querySelector("#gallery");
    const viewer = document.querySelector("#viewer");
    const viewerStage = document.querySelector("#viewerStage");
    const viewerImg = document.querySelector("#viewerImg");
    const viewerTitle = document.querySelector("#viewerTitle");
    const viewerStatus = document.querySelector("#viewerStatus");
    const closeViewer = document.querySelector("#closeViewer");
    const viewerDownload = document.querySelector("#viewerDownload");

    const previewCache = new Map();

    function fileUrl(fileName) {
      return baseUrl + encodeURIComponent(fileName);
    }

    function isHeic(fileName) {
      return /\.(heic|heif)$/i.test(fileName);
    }

    async function convertHeicToJpegUrl(fileName) {
      if (previewCache.has(fileName)) return previewCache.get(fileName);

      if (typeof heic2any !== "function") {
        throw new Error("heic2any 尚未載入，請確認網路或 CDN。");
      }

      const response = await fetch(fileUrl(fileName));
      if (!response.ok) throw new Error("圖片下載失敗：" + response.status);

      const heicBlob = await response.blob();

      const jpegBlob = await heic2any({
        blob: heicBlob,
        toType: "image/jpeg",
        quality: 0.92
      });

      const objectUrl = URL.createObjectURL(
        Array.isArray(jpegBlob) ? jpegBlob[0] : jpegBlob
      );

      previewCache.set(fileName, objectUrl);
      return objectUrl;
    }

    async function loadImageWithHeicFallback(img, fileName, statusEl) {
      const url = fileUrl(fileName);

      statusEl.classList.remove("hide");
      statusEl.innerHTML = `
        <div>
          <div class="spinner"></div>
          <strong>載入照片中</strong>
          <span>${fileName}</span>
        </div>
      `;

      img.onload = () => {
        statusEl.classList.add("hide");
      };

      img.onerror = async () => {
        if (!isHeic(fileName)) {
          statusEl.innerHTML = `
            <div>
              <strong>預覽載入失敗</strong>
              <span>請直接下載原圖。</span>
            </div>
          `;
          return;
        }

        try {
          statusEl.innerHTML = `
            <div>
              <div class="spinner"></div>
              <strong>正在轉換 HEIC 預覽</strong>
              <span>Chrome 需要前端解碼</span>
            </div>
          `;

          const convertedUrl = await convertHeicToJpegUrl(fileName);

          img.onerror = () => {
            statusEl.innerHTML = `
              <div>
                <strong>轉換後仍無法預覽</strong>
                <span>請直接下載原始 HEIC。</span>
              </div>
            `;
          };

          img.src = convertedUrl;
        } catch (error) {
          console.error(error);
          statusEl.innerHTML = `
            <div>
              <strong>HEIC 轉換失敗</strong>
              <span>${error.message || "請確認 GitHub raw 檔案可被跨網域讀取。"}</span>
            </div>
          `;
        }
      };

      img.src = url;
    }

    async function getPreviewUrl(fileName) {
      if (!isHeic(fileName)) return fileUrl(fileName);
      return await convertHeicToJpegUrl(fileName);
    }

    function fitViewerToHalfOriginal() {
      const naturalWidth = viewerImg.naturalWidth || 0;
      const naturalHeight = viewerImg.naturalHeight || 0;

      if (!naturalWidth || !naturalHeight) return;

      viewerImg.style.width = Math.round(naturalWidth * 0.5) + "px";
      viewerImg.style.height = "auto";

      requestAnimationFrame(() => {
        viewerStage.scrollLeft = Math.max(0, (viewerStage.scrollWidth - viewerStage.clientWidth) / 2);
        viewerStage.scrollTop = Math.max(0, (viewerStage.scrollHeight - viewerStage.clientHeight) / 2);
      });
    }

    async function openViewer(fileName) {
      viewerTitle.textContent = fileName;
      viewerDownload.href = fileUrl(fileName);
      viewerDownload.download = fileName;
      viewerImg.removeAttribute("src");
      viewerImg.alt = fileName;
      viewerImg.style.width = "";
      viewerImg.style.height = "";

      viewerStatus.classList.remove("hide");
      viewerStatus.innerHTML = `
        <div>
          <div class="spinner"></div>
          <strong>正在準備預覽</strong>
          <span>${fileName}</span>
        </div>
      `;

      viewer.classList.add("show");
      viewer.setAttribute("aria-hidden", "false");
      document.body.classList.add("viewer-open");

      try {
        const url = await getPreviewUrl(fileName);

        viewerImg.onload = () => {
          viewerStatus.classList.add("hide");
          fitViewerToHalfOriginal();
        };

        viewerImg.onerror = () => {
          viewerStatus.innerHTML = `
            <div>
              <strong>放大預覽失敗</strong>
              <span>請下載原圖查看。</span>
            </div>
          `;
        };

        viewerImg.src = url;
      } catch (error) {
        console.error(error);
        viewerStatus.innerHTML = `
          <div>
            <strong>HEIC 轉換失敗</strong>
            <span>${error.message || "請直接下載原圖。"}</span>
          </div>
        `;
      }
    }

    function closeViewerNow() {
      viewer.classList.remove("show");
      viewer.setAttribute("aria-hidden", "true");
      document.body.classList.remove("viewer-open");
      viewerImg.removeAttribute("src");
      viewerImg.style.width = "";
      viewerImg.style.height = "";
      viewerStage.scrollLeft = 0;
      viewerStage.scrollTop = 0;
    }

    photos.forEach((fileName, index) => {
      const url = fileUrl(fileName);

      const card = document.createElement("article");
      card.className = "card";

      card.innerHTML = `
        <div class="thumb" role="button" tabindex="0" aria-label="放大 ${fileName}">
          <img alt="${fileName}" loading="lazy">
          <div class="status">
            <div>
              <div class="spinner"></div>
              <strong>載入照片中</strong>
              <span>${fileName}</span>
            </div>
          </div>
        </div>
        <div class="meta">
          <div class="name">${String(index + 1).padStart(2, "0")} · ${fileName}</div>
          <div class="actions">
            <button class="btn preview" type="button">放大</button>
            <a class="btn" href="${url}" download="${fileName}">下載 HEIC</a>
          </div>
        </div>
      `;

      const img = card.querySelector("img");
      const statusEl = card.querySelector(".status");
      const thumb = card.querySelector(".thumb");
      const preview = card.querySelector(".preview");

      loadImageWithHeicFallback(img, fileName, statusEl);

      thumb.addEventListener("click", () => openViewer(fileName));
      thumb.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openViewer(fileName);
        }
      });

      preview.addEventListener("click", () => openViewer(fileName));

      gallery.appendChild(card);
    });

    closeViewer.addEventListener("click", closeViewerNow);

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && viewer.classList.contains("show")) closeViewerNow();
    });

    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let scrollStartLeft = 0;
    let scrollStartTop = 0;

    viewerStage.addEventListener("mousedown", (event) => {
      if (!viewer.classList.contains("show")) return;
      isDragging = true;
      viewerStage.classList.add("dragging");
      dragStartX = event.clientX;
      dragStartY = event.clientY;
      scrollStartLeft = viewerStage.scrollLeft;
      scrollStartTop = viewerStage.scrollTop;
      event.preventDefault();
    });

    window.addEventListener("mousemove", (event) => {
      if (!isDragging) return;
      const dx = event.clientX - dragStartX;
      const dy = event.clientY - dragStartY;
      viewerStage.scrollLeft = scrollStartLeft - dx;
      viewerStage.scrollTop = scrollStartTop - dy;
    });

    window.addEventListener("mouseup", () => {
      isDragging = false;
      viewerStage.classList.remove("dragging");
    });

    viewerStage.addEventListener("touchstart", (event) => {
      if (event.touches.length !== 1) return;
      isDragging = true;
      dragStartX = event.touches[0].clientX;
      dragStartY = event.touches[0].clientY;
      scrollStartLeft = viewerStage.scrollLeft;
      scrollStartTop = viewerStage.scrollTop;
    }, { passive: true });

    viewerStage.addEventListener("touchmove", (event) => {
      if (!isDragging || event.touches.length !== 1) return;
      const dx = event.touches[0].clientX - dragStartX;
      const dy = event.touches[0].clientY - dragStartY;
      viewerStage.scrollLeft = scrollStartLeft - dx;
      viewerStage.scrollTop = scrollStartTop - dy;
    }, { passive: true });

    viewerStage.addEventListener("touchend", () => {
      isDragging = false;
    });

    window.addEventListener("beforeunload", () => {
      previewCache.forEach((url) => URL.revokeObjectURL(url));
    });
  </script>
</body>
</html>
